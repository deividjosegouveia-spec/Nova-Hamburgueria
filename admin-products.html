<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Produtos - Burger Express Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/admin-products.css">
</head>
<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">🍔 Burger Express</div>
                <div class="sidebar-subtitle">Painel Administrativo</div>
            </div>

            <nav>
                <ul class="sidebar-menu">
                    <li class="menu-item">
                        <a href="dashboard.html" class="menu-link">
                            <i class="fas fa-chart-line"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <li class="menu-item">
                        <a href="admin-orders.html" class="menu-link">
                            <i class="fas fa-shopping-bag"></i>
                            <span>Pedidos</span>
                        </a>
                    </li>
                    <li class="menu-item">
                        <a href="admin-products.html" class="menu-link active">
                            <i class="fas fa-hamburger"></i>
                            <span>Produtos</span>
                        </a>
                    </li>
                </ul>
            </nav>

            <button class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Sair
            </button>
        </aside>

        <!-- Main Content -->
        <main class="main-content-admin">
            <div class="admin-header">
                <div>
                    <h1 class="admin-title">Gerenciar Produtos</h1>
                    <p class="admin-subtitle">Adicione, edite e gerencie o cardápio</p>
                </div>
                <button class="add-product-btn" onclick="openProductModal()">
                    <i class="fas fa-plus"></i> Novo Produto
                </button>
            </div>

            <!-- Products Grid -->
            <div class="products-admin-grid" id="productsGrid">
                <!-- Products will be loaded here -->
            </div>
        </main>
    </div>

    <!-- Product Modal -->
    <div class="modal" id="productModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Novo Produto</h2>
                <button class="close-modal" onclick="closeProductModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="productForm" class="product-form">
                    <input type="hidden" id="productId">
                    
                    <div class="form-group">
                        <label for="productName">Nome do Produto *</label>
                        <input type="text" id="productName" required placeholder="Ex: X-Bacon Artesanal">
                    </div>

                    <div class="form-group">
                        <label for="productDescription">Descrição *</label>
                        <textarea id="productDescription" required placeholder="Descreva o produto..." rows="3"></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="productPrice">Preço (R$) *</label>
                            <input type="number" id="productPrice" required step="0.01" min="0" placeholder="0.00">
                        </div>

                        <div class="form-group">
                            <label for="productCategory">Categoria *</label>
                            <select id="productCategory" required>
                                <option value="">Selecione...</option>
                                <option value="Hambúrgueres">Hambúrgueres</option>
                                <option value="Milkshakes">Milkshakes</option>
                                <option value="Açaí">Açaí</option>
                                <option value="Guaraná">Guaraná</option>
                                <option value="Outros">Outros</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="productImage">URL da Imagem *</label>
                        <input type="url" id="productImage" required placeholder="https://...">
                    </div>

                    <div class="form-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="productAvailable" checked>
                            <span>Produto disponível</span>
                        </label>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn-cancel" onclick="closeProductModal()">Cancelar</button>
                        <button type="submit" class="btn-save">
                            <i class="fas fa-save"></i> Salvar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Loading Spinner -->
    <div class="loading hidden" id="loading">
        <div class="spinner"></div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/admin-products.js"></script>
</body>
</html>
