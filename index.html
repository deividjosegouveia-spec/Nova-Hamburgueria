<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍔 Burger Express - Peça Agora!</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <h1 class="logo">🍔 Burger Express</h1>
                <button class="cart-btn" onclick="toggleCart()">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" id="cartCount">0</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Banner -->
            <section class="banner">
                <h2>Bem-vindo ao Burger Express! 🔥</h2>
                <p>Os melhores hambúrgueres artesanais da cidade</p>
            </section>

            <!-- Categories Filter -->
            <div class="categories">
                <button class="category-btn active" data-category="all">Todos</button>
                <button class="category-btn" data-category="Hambúrgueres">🍔 Hambúrgueres</button>
                <button class="category-btn" data-category="Milkshakes">🥤 Milkshakes</button>
                <button class="category-btn" data-category="Açaí">🍇 Açaí</button>
                <button class="category-btn" data-category="Guaraná">🥤 Guaraná</button>
            </div>

            <!-- Products Grid -->
            <section class="products-section">
                <h2 class="section-title">Nosso Cardápio</h2>
                <div class="products-grid" id="productsGrid">
                    <!-- Products will be loaded here -->
                </div>
            </section>
        </div>
    </main>

    <!-- Cart Sidebar -->
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3>🛒 Seu Carrinho</h3>
            <button class="close-cart" onclick="toggleCart()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="cart-items" id="cartItems">
            <!-- Cart items will be displayed here -->
        </div>
        <div class="cart-empty" id="cartEmpty">
            <i class="fas fa-shopping-basket"></i>
            <p>Seu carrinho está vazio</p>
        </div>
        <div class="cart-footer" id="cartFooter">
            <div class="cart-total">
                <span>Total:</span>
                <span class="total-value" id="totalValue">R$ 0,00</span>
            </div>
            <button class="checkout-btn" onclick="goToCheckout()">
                Finalizar Pedido <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <!-- Cart Overlay -->
    <div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>

    <!-- Loading Spinner -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
